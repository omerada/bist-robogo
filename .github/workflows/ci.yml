# bist-robogo CI/CD Pipeline
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  PNPM_VERSION: "10"

jobs:
  # ── Backend Lint ──
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Poetry kurulumu
        run: pip install poetry==1.8.4

      - name: Bağımlılık cache
        uses: actions/cache@v4
        with:
          path: backend/.venv
          key: poetry-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('backend/poetry.lock') }}
          restore-keys: poetry-${{ runner.os }}-${{ env.PYTHON_VERSION }}-

      - name: Bağımlılıkları kur
        run: |
          poetry config virtualenvs.in-project true
          poetry install --no-interaction --no-ansi

      - name: Ruff lint
        run: poetry run ruff check app/ tests/

      - name: Ruff format check
        run: poetry run ruff format --check app/ tests/

      - name: Mypy type check
        run: poetry run mypy app/ --ignore-missing-imports --no-error-summary || true

  # ── Backend Tests ──
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: bist_user
          POSTGRES_PASSWORD: bist_test_pass
          POSTGRES_DB: bist_robogo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bist_user -d bist_robogo_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_ENV: test
      DATABASE_URL: postgresql+asyncpg://bist_user:bist_test_pass@localhost:5432/bist_robogo_test
      TEST_DATABASE_URL: postgresql+asyncpg://bist_user:bist_test_pass@localhost:5432/bist_robogo_test
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      JWT_SECRET_KEY: test-jwt-secret-key-ci
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Poetry kurulumu
        run: pip install poetry==1.8.4

      - name: Bağımlılık cache
        uses: actions/cache@v4
        with:
          path: backend/.venv
          key: poetry-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('backend/poetry.lock') }}
          restore-keys: poetry-${{ runner.os }}-${{ env.PYTHON_VERSION }}-

      - name: Bağımlılıkları kur
        run: |
          poetry config virtualenvs.in-project true
          poetry install --no-interaction --no-ansi

      - name: Pytest + Coverage
        run: poetry run pytest --cov=app --cov-report=xml --cov-report=term-missing -v

      - name: Coverage yükle
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          retention-days: 7

  # ── Frontend Lint & Type Check ──
  frontend-lint:
    name: Frontend Lint & Types
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Bağımlılıkları kur
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm exec tsc --noEmit

      - name: ESLint
        run: pnpm lint

  # ── Frontend Unit Tests ──
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Bağımlılıkları kur
        run: pnpm install --frozen-lockfile

      - name: Vitest unit tests
        run: pnpm test -- --run --reporter=verbose

  # ── Docker Build Verification ──
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test, frontend-lint, frontend-test]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Backend image build
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: bist-robogo-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Frontend image build
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: bist-robogo-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
