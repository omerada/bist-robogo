# Source: Doc 10 §1.1 — Docker Compose (Geliştirme Ortamı)

services:
  # ── PostgreSQL 16 + TimescaleDB ──
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: bist-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bist_user
      POSTGRES_PASSWORD: bist_dev_pass_2026
      POSTGRES_DB: bist_robogo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bist_user -d bist_robogo"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis 7 ──
  redis:
    image: redis:7-alpine
    container_name: bist-redis
    restart: unless-stopped
    command: redis-server --requirepass bist_redis_pass_2026 --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "bist_redis_pass_2026", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Backend (FastAPI) ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bist-backend
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - APP_ENV=development
      - DEBUG=true
      - DATABASE_URL=postgresql+asyncpg://bist_user:bist_dev_pass_2026@postgres:5432/bist_robogo
      - TEST_DATABASE_URL=postgresql+asyncpg://bist_user:bist_dev_pass_2026@postgres:5432/bist_robogo_test
      - REDIS_URL=redis://:bist_redis_pass_2026@redis:6379/0
      - CELERY_BROKER_URL=redis://:bist_redis_pass_2026@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:bist_redis_pass_2026@redis:6379/2
      - JWT_SECRET_KEY=dev-jwt-secret-key-change-in-production-2026
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - REFRESH_TOKEN_EXPIRE_DAYS=30
      - CORS_ORIGINS=["http://localhost:3000"]
      - LOG_LEVEL=DEBUG
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Worker ──
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bist-celery-worker
    restart: unless-stopped
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4
    healthcheck:
      test:
        ["CMD-SHELL", "celery -A app.tasks.celery_app inspect ping --timeout 5"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      - APP_ENV=development
      - DATABASE_URL=postgresql+asyncpg://bist_user:bist_dev_pass_2026@postgres:5432/bist_robogo
      - REDIS_URL=redis://:bist_redis_pass_2026@redis:6379/0
      - CELERY_BROKER_URL=redis://:bist_redis_pass_2026@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:bist_redis_pass_2026@redis:6379/2
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Beat (Scheduler) ──
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bist-celery-beat
    restart: unless-stopped
    command: celery -A app.tasks.celery_app beat --loglevel=info --pidfile=/tmp/celerybeat.pid
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "test -f /tmp/celerybeat.pid && kill -0 $(cat /tmp/celerybeat.pid)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      - APP_ENV=development
      - DATABASE_URL=postgresql+asyncpg://bist_user:bist_dev_pass_2026@postgres:5432/bist_robogo
      - REDIS_URL=redis://:bist_redis_pass_2026@redis:6379/0
      - CELERY_BROKER_URL=redis://:bist_redis_pass_2026@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:bist_redis_pass_2026@redis:6379/2
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
    depends_on:
      redis:
        condition: service_healthy

  # ── Frontend (Next.js) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: bist-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  backend_venv:
